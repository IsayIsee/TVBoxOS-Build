name: Build-APK

on:
  schedule:
    - cron: 30 2 * * *
  workflow_dispatch:
    inputs:
      rebuild:
        description: '忽略构建记录以重新构建'
        required: false
        type: boolean
      donotpublish:
        description: '构建后不提交发布新版'
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  telegram-bot-api:
    name: Telegram Bot API
    runs-on: ubuntu-latest
    outputs:
      binary-key: ${{ steps.tool-sha.outputs.sha }}
    steps:
      - name: Get Tool SHA
        id: tool-sha
        run: echo "sha=$(git ls-remote https://github.com/tdlib/telegram-bot-api.git HEAD | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Check Cache
        id: cache-bin
        uses: actions/cache@v5
        with:
          path: telegram-bot-api-binary
          key: tg-api-${{ steps.tool-sha.outputs.sha }}

      # 有 cache 直接跳到 Upload，以下三步全部跳过
      - name: Checkout
        if: steps.cache-bin.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Compile Telegram Bot API
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install make git zlib1g-dev libssl-dev gperf cmake g++ -y
          git clone --recursive https://github.com/tdlib/telegram-bot-api.git
          cd telegram-bot-api && mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --target install -j$(nproc)
          cd ../..
          find telegram-bot-api -name "telegram-bot-api" -type f -executable -exec cp {} ./telegram-bot-api-binary \;

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-binary
          path: telegram-bot-api-binary
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: telegram-bot-api
    strategy:
      fail-fast: false
      matrix:
        include:
          - userName: IsayIsee
            repoName: TVBoxOS
            branchName: main
            developer: q215613905
          - userName: IsayIsee
            repoName: Takagen-Box
            branchName: main
            java_ver: 17
            developer: takagen99
          - userName: IsayIsee
            repoName: FongMI
            branchName: my_release
            java_ver: 17
            developer: FongMI
          - userName: IsayIsee
            repoName: FongMI
            branchName: my_dev
            java_ver: 21
            developer: FongMI
          - userName: IsayIsee
            repoName: webhtv
            branchName: webhtv_dev
            java_ver: 21
            developer: fish2018
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Check New Commit
        run: |
          upStream=https://github.com/${{ matrix.userName }}/${{ matrix.repoName }}
          echo "upStream=$upStream" >> $GITHUB_ENV
          commit=$(curl -sL $upStream/commits/${{ matrix.branchName }} | grep -o "/${{ matrix.userName }}/${{ matrix.repoName }}/commit/[a-z0-9]\+" | head -1 | cut -d\/ -f5)
          if [[ -z "${commit}" ]]; then
            commit=$(curl -s "https://api.github.com/repos/${{ matrix.userName }}/${{ matrix.repoName }}/commits/${{ matrix.branchName }}?per_page=1" | jq -r '.sha' )
          fi
          if ! grep -q "$commit" README.md || [ "${{ inputs.rebuild }}" == "true" ]; then
            echo "commit=$commit" >> $GITHUB_ENV
            echo "commitS=${commit:0:7}" >> $GITHUB_ENV
          fi

      - name: Checkout Source Code
        if: ${{ env.commit }}
        run: |
          git clone ${{ env.upStream }} TVBoxOSC
          cd TVBoxOSC
          git checkout ${{ env.commit }}
          echo "tag=$(git log --date=format:'%y%m%d-%H' --pretty=format:%cd ${{ env.commitS }} -1)" >> $GITHUB_ENV

      - name: Extra Modify
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          if [ "${{ matrix.developer }}" == "takagen99" ]; then
            sed -i 's/\.concat(buildTime())/ +\"${{ env.tag }}\"/g' app/build.gradle 
            sed -i "/android:text=/s#=\"#=\"${{ env.tag }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
          else
            # 提取原始 versionName
            if [ -f app/build.gradle ]; then
              ORIG_VERSION=$(grep 'versionName' app/build.gradle | grep -o '[0-9a-zA-Z_.\"-]*$' | tr -d '"'\' | head -1)
            fi
            if [ -z "$ORIG_VERSION" ]; then
              echo "origVersionName=${{ env.tag }}" >> $GITHUB_ENV
              echo "Original versionName: ${{ env.tag }}"          
            else
              echo "origVersionName=$ORIG_VERSION" >> $GITHUB_ENV
              echo "Original versionName: $ORIG_VERSION"
            fi
          
            VERSION_CODE=$(echo "${{ env.tag }}" | tr -dc '0-9' | cut -c1-9)
            VERSION_NAME=$(echo "${{ env.tag }}-${{ matrix.branchName }}" | sed 's/my_//')    
            echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
            echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
            [ -f app/build.gradle ] && sed -i "/versionName/s#[0-9a-zA-Z_\.\'\"-]\+\$#\'$VERSION_NAME\'#" app/build.gradle
            [ -f app/src/main/res/layout/dialog_about.xml ] && sed -i "/android:text=/s#=\"#=\"${{ env.tag }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
            [ -f app/build.gradle ] && sed -i "/versionCode/s#versionCode.*#versionCode $VERSION_CODE#" app/build.gradle
          fi 
          if grep -q 'crosswalk' build.gradle; then
            sed -i "/crosswalk/a\        maven { url 'https://o0halflife0o.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          else
            sed -i "/jitpack.io/a\        maven { url 'https://o0halflife0o.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          fi
          
          echo "::group::build.gradle 修改详情"
          git diff "app/build.gradle"
          echo "::endgroup::"          
          # 更新不同分支的升级检查路径
          
          GITHUB_JAVA_FILE="app/src/main/java/com/fongmi/android/tv/utils/Github.java"

          if [ -f "$GITHUB_JAVA_FILE" ]; then
            sed -i "s#\"/apk/\"#\"/apk/${{ matrix.branchName }}/\"#g" "$GITHUB_JAVA_FILE"
          
            echo "Successfully updated Github.java for branch: ${{ matrix.branchName }}"
          
            echo "::group::Github.java 修改详情"
            git diff "$GITHUB_JAVA_FILE"
            echo "::endgroup::" 
          else
            echo "Error: Github.java not found at $GITHUB_JAVA_FILE"
          fi

      - name: Compress Source Code
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: tar -cJf SourceCode-${{ env.tag }}.tar.xz --exclude=.git --exclude=.github *

      - name: Setup Python
        if: ${{ env.commit }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        if: ${{ env.commit }}
        run: |
          python -m pip install --upgrade pip
          pip install lxml ujson pyquery requests jsonpath cachetools pycryptodome beautifulsoup4

      - name: Setup local.properties
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          if [ -d "pyramid" ]; then
            sed -i '/buildPython.*python.exe/d' pyramid/build.gradle || true
            cp local.properties pyramid/
          fi

      - name: Setup Project Properties
        if: ${{ env.commit }}
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: TVBoxOSC
        run: |
          # 创建 keystore 文件
          echo "$ENCODED_STRING" | tr -d '\n\r ' | base64 -d > ${{ github.workspace }}/release.jks
          
          ROOT_DIR=$(pwd)
          mkdir -p app
          cp -f ${{ github.workspace }}/release.jks app/TVBoxOSC.jks
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          if [[ "${{ matrix.developer }}" == "FongMI" || "${{ matrix.developer }}" == "fish2018" ]]; then
            PYTHON_PATH=$(which python3)
            {
              echo "storeFile=$ROOT_DIR/app/TVBoxOSC.jks"
              echo "keyAlias=$SIGNING_KEY_ALIAS"
              echo "storePassword=$SIGNING_STORE_PASSWORD"
              echo "keyPassword=$SIGNING_KEY_PASSWORD"
              echo "chaquopy.python=$PYTHON_PATH"
            } >> local.properties
          
            # 清理 Windows 硬编码
            find . -name "build.gradle" -exec sed -i 's/python.exe//g' {} +
          fi

          [ -f ./gradle.properties ] && echo -e "\n" >> ./gradle.properties || touch ./gradle.properties
          {
            echo "storeFile=$ROOT_DIR/app/TVBoxOSC.jks"
            echo "keyAlias=$SIGNING_KEY_ALIAS"
            echo "storePassword=$SIGNING_STORE_PASSWORD"
            echo "keyPassword=$SIGNING_KEY_PASSWORD"
            echo "org.gradle.caching=true"
            echo "org.gradle.parallel=true"
            echo "org.gradle.daemon=false"
            echo "org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC -XX:MaxMetaspaceSize=512m"
          } >> ./gradle.properties

          if [ -d "pyramid" ]; then
            cp local.properties pyramid/
          fi

      - name: Setup Java
        if: ${{ env.commit && matrix.java_ver }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java_ver }}

      - name: Setup Gradle
        if: ${{ env.commit }}
        uses: gradle/actions/setup-gradle@v4

      - name: Build With Gradle
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          chmod +x gradlew
          
          BUILD_ARGS="assemblerelease --build-cache --parallel"
          
          if [[ "${{ matrix.developer }}" == "FongMI" || "${{ matrix.developer }}" == "fish2018" ]]; then
            echo "Applying Python 3.10 path enforcement for FongMi..."
            PYTHON_310_EXE=$(which python3.10 || which python3)
            echo "Python 3.10 path is: $PYTHON_310_EXE"
            sudo ln -sf "$PYTHON_310_EXE" /usr/bin/python
            BUILD_ARGS="$BUILD_ARGS -Pchaquopy.python=$PYTHON_310_EXE"
          fi

          ./gradlew $BUILD_ARGS

      - name: Prepare App
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          rm -rf apk/ && mkdir -p apk/
          for file in $(find . -name "*.apk" \
                          -not -path "*/debug/*" \
                          -not -path "./apk/*" \
                          -not -path "./Release/*" \
                          -print); do
            base=$(basename "$file")
            new_base="TVBox_${{ matrix.developer }}_${{ env.tag }}_${base}"
            echo "Moving $file -> apk/$new_base"
            cp "$file" "apk/$new_base"
          done
          mv SourceCode-${{ env.tag }}.* apk/

      - name: Release Note
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          lastCommit=$(grep "${{ matrix.repoName }}\/${{ matrix.branchName }}" ${{ github.workspace }}/README.md | grep -o '[a-z0-9]\{40\}' || echo "")
          {
            echo "Credit: ${{ matrix.developer }}"
            echo "Commit: ${{ env.commit }}"

            if [[ "${{ matrix.developer }}" == "FongMI" || "${{ matrix.developer }}" == "fish2018" ]] && [ -n "${{ env.origVersionName }}" ]; then
              echo "Original version: ${{ env.origVersionName }}"
              echo "Compiled version: ${{ env.tag }}-${{ matrix.branchName }}"
            fi
            echo "Changelog:"
            echo '```'
          } > apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log
          
          THREE_MONTHS_AGO=$(date -d '3 months ago' '+%Y-%m-%d')
          
          if [ -n "$lastCommit" ]; then
            LOG=$(git log --pretty=format:'%ad %s' \
                  --date=format:'%y/%m/%d' \
                  --after="$THREE_MONTHS_AGO" \
                  ${lastCommit:0:7}..${{ env.commitS }} \
              | sed -e "s# \{2,\}#\n#g" \
                    -e "/^Merge \(pull\|branch\|remote\)/d" \
                    -e '/^$/d' \
              | cat -n | sort -k2,2 -k1,1n | uniq -f1 | sort -k1,1n | cut -f2-)
            if [ -z "$LOG" ]; then
              LOG=$(git log --pretty=format:'%ad %s' \
                  --date=format:'%y/%m/%d' \
                ${{ env.commitS }} -10 \
                | sed -e "s# \{2,\}#\n#g" \
                      -e "/^Merge \(pull\|branch\|remote\)/d" \
                      -e '/^$/d' \
                | cat -n | sort -k2,2 -k1,1n | uniq -f1 | sort -k1,1n | cut -f2-)
            fi
          else
            LOG=$(git log --pretty=format:'%ad %s' \
                  --date=format:'%y/%m/%d' \
              ${{ env.commitS }} -10 \
              | sed -e "s# \{2,\}#\n#g" \
                    -e "/^Merge \(pull\|branch\|remote\)/d" \
                    -e '/^$/d')
          fi
          echo "$LOG" >> apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log
          echo -e '\n```' >> apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log

      - name: Update APK To Repo
        if: ${{ env.commit && ( matrix.developer == 'FongMI' || matrix.developer == 'fish2018' ) }}
        run: |
          APK_DIR="${{ github.workspace }}/apk/${{ matrix.branchName }}"
          mkdir -p "$APK_DIR"

          CODE=$(echo "${{ env.tag }}" | tr -d '-')

          lastCommit=$(grep "${{ matrix.repoName }}\/${{ matrix.branchName }}" \
                        "${{ github.workspace }}/README.md" \
                        | grep -o '[a-z0-9]\{40\}' || echo "")

          THREE_MONTHS_AGO=$(date -d '3 months ago' '+%Y-%m-%d')
          
          if [ -n "$lastCommit" ]; then
            RAW_LOG=$(cd "${{ github.workspace }}/TVBoxOSC" && \
              git log --pretty=format:'%ad %s' \
                  --date=format:'%y/%m/%d' \
                --after="$THREE_MONTHS_AGO" \
                ${lastCommit:0:7}..${{ env.commitS }} 2>/dev/null \
              | grep -v "^Merge " | grep -v "^$" || echo "")

            if [ -z "$RAW_LOG" ]; then
              RAW_LOG=$(cd "${{ github.workspace }}/TVBoxOSC" && \
                git log --pretty=format:'%ad %s' \
                  --date=format:'%y/%m/%d' \
                  ${{ env.commitS }} -10 2>/dev/null \
                | grep -v "^Merge " | grep -v "^$" || echo "")
            fi
          else
            RAW_LOG=$(cd "${{ github.workspace }}/TVBoxOSC" && \
              git log --pretty=format:'%ad %s' \
                  --date=format:'%y/%m/%d' \
                ${{ env.commitS }} -10 2>/dev/null \
              | grep -v "^Merge " | grep -v "^$" || echo "")
          fi
          
          if [ -n "${{ env.origVersionName }}" ]; then
            VERSION_LINE="版本: ${{ env.origVersionName }} → ${{ env.tag }}-${{ matrix.branchName }}"
            RAW_LOG=$(printf '%s\n%s' "$VERSION_LINE" "$RAW_LOG")
          fi
          
          [ -z "$RAW_LOG" ] && RAW_LOG="${{ env.tag }}"

          # 把变量写入临时文件，再由 Python 读取
          echo "$CODE"                       > /tmp/fongmi_code.txt
          echo "${{ env.VERSION_NAME }}"     > /tmp/fongmi_name.txt
          echo "${{ matrix.branchName }}"    > /tmp/fongmi_branch.txt
          printf '%s' "$RAW_LOG"             > /tmp/fongmi_raw.txt
          echo "$APK_DIR"                    > /tmp/fongmi_dir.txt
          echo "${{ env.tag }}"              > /tmp/fongmi_tag.txt
          echo "https://github.com/${{ github.repository }}" > /tmp/fongmi_repo.txt
          echo "${{ matrix.developer }}"  > /tmp/fongmi_developer.txt
          
          python3 ${{ github.workspace }}/.github/scripts/update_apk_json.py

      - name: Post To Work Wechat
        if: ${{ env.commit }}
        continue-on-error: true
        uses: fjogeleit/http-request-action@v2
        with:
          url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WORK_WECHAT_WEBHOOK_KEY }}"
          method: 'POST'
          contentType: 'application/json'
          data: |
            {
              "msgtype": "markdown_v2", 
              "markdown_v2": {
                "content":"### TVBox 项目构建成功\n- **项目**: ${{ matrix.repoName }}\n- **分支**: ${{ matrix.branchName }}\n- **版本**: ${{ env.origVersionName }}"
              }
            }

      - name: Download TG Tool
        if: ${{ env.commit }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: telegram-bot-api-binary
          path: TVBoxOSC

      - name: Post To Telegram
        if: ${{ env.commit }}
        continue-on-error: true
        working-directory: TVBoxOSC
        env:
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            sed -i '1,/[Cc][Hh][Aa][Nn][Gg][Ee][Ll][Oo][Gg]:/d' apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log
            sed -i '/^```/d' apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log
            sed -i '1i\```' apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log
            sed -i -e 's#\([&"]\)#\\\1#g' apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log
            echo -e '```' >> apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log
            cp -f apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log caption.txt
            cat caption.txt
            chmod +x telegram-bot-api-binary
            ./telegram-bot-api-binary --api-id=${{ secrets.TELEGRAM_API_ID }} --api-hash=${{ secrets.TELEGRAM_API_HASH }} --local> telegram.log 2>&1 &
            echo "等待 Telegram Local API 启动..."
          
            success=0
            for i in {1..30}; do
              curl -s http://127.0.0.1:8081 > /dev/null 2>&1 && { success=1; break; }
              sleep 1
            done
          
            if [ $success -eq 0 ]; then
              echo "确定失败！Telegram API 服务无法启动。以下是真实错误日志："
              echo "----------------------------------------"
              cat telegram.log
              echo "----------------------------------------"
              exit 1
            else
              echo "Telegram Local API 成功启动！继续下一步..."
            fi
            TARGET_SCRIPT="../.github/scripts/upload.py"
          
            if [ -f "$TARGET_SCRIPT" ]; then
              echo "发现上传脚本，正在移动并准备执行..."
              mv "$TARGET_SCRIPT" ./
            fi
          
            if [ -f "upload.py" ]; then
              echo "开始执行 python upload.py..."
          
              if ! python upload.py; then
                echo "Python 脚本执行失败！请检查上方 Python 打印的 Traceback 堆栈错误。"
                exit 1
              fi
          
              echo "Python 脚本执行成功！"
            else
              echo "错误：未找到 upload.py 脚本！"
              exit 1
            fi
          fi

      - name: Update FongMI Version History
        if: ${{ env.commit && matrix.developer == 'FongMI' }}
        run: |
          HISTORY_FILE="${{ github.workspace }}/version_history.md"
          touch "$HISTORY_FILE"
          
          TEMP_LOG="/tmp/current_branch_history.md"
          
          echo "### FongMi [${{ matrix.branchName }}] - 更新于 $(date '+%Y-%m-%d %H:%M')" > "$TEMP_LOG"
          if [ -n "${{ env.origVersionName }}" ]; then
            echo "- **原始版本**: ${{ env.origVersionName }}" >> "$TEMP_LOG"
            echo "- **编译版本**: ${{ env.tag }}-${{ matrix.branchName }}" >> "$TEMP_LOG"
          fi
          echo "- **提交哈希**: [${{ env.commitS }}](https://github.com/${{ matrix.userName }}/${{ matrix.repoName }}/commit/${{ env.commit }})" >> "$TEMP_LOG"
          echo -e "\n**详细日志/Changelog**:\n" >> "$TEMP_LOG"
          
          if [ -f "TVBoxOSC/apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log" ]; then
            cat "TVBoxOSC/apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log" >> "$TEMP_LOG"
          else
            echo "> 暂无详细更新日志。" >> "$TEMP_LOG"
          fi
          echo -e "\n---\n" >> "$TEMP_LOG"
          
          cat "$HISTORY_FILE" >> "$TEMP_LOG"
          mv "$TEMP_LOG" "$HISTORY_FILE"
          
          echo "Successfully updated version_history.md for ${{ matrix.branchName }}"

      - name: Update WebHomeTV Version History
        if: ${{ env.commit && matrix.developer == 'fish2018' }}
        run: |
          HISTORY_FILE="${{ github.workspace }}/version_history_webhtv.md"
          touch "$HISTORY_FILE"
          
          TEMP_LOG="/tmp/current_branch_history.md"
          
          echo "### WebHomeTV [${{ matrix.branchName }}] - 更新于 $(date '+%Y-%m-%d %H:%M')" > "$TEMP_LOG"
          if [ -n "${{ env.origVersionName }}" ]; then
            echo "- **原始版本**: ${{ env.origVersionName }}" >> "$TEMP_LOG"
            echo "- **编译版本**: ${{ env.tag }}-${{ matrix.branchName }}" >> "$TEMP_LOG"
          fi
          echo "- **提交哈希**: [${{ env.commitS }}](https://github.com/${{ matrix.userName }}/${{ matrix.repoName }}/commit/${{ env.commit }})" >> "$TEMP_LOG"
          echo -e "\n**详细日志/Changelog**:\n" >> "$TEMP_LOG"
          
          if [ -f "TVBoxOSC/apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log" ]; then
            cat "TVBoxOSC/apk/${{ matrix.userName }}-${{ matrix.branchName }}-Release.log" >> "$TEMP_LOG"
          else
            echo "> 暂无详细更新日志。" >> "$TEMP_LOG"
          fi
          echo -e "\n---\n" >> "$TEMP_LOG"
          
          cat "$HISTORY_FILE" >> "$TEMP_LOG"
          mv "$TEMP_LOG" "$HISTORY_FILE"
          
          echo "Successfully updated version_history_webhtv.md for ${{ matrix.branchName }}"

      - name: Whether Or Not to Publish
        if: ${{ inputs.donotpublish && env.commit }}
        run: |
          echo "commit=" >> $GITHUB_ENV

      - name: Save Job Metadata
        if: ${{ env.commit }}
        run: |
          cat > /tmp/job-meta.json << EOF
          {
            "commit":          "${{ env.commit }}",
            "commitS":         "${{ env.commitS }}",
            "tag":             "${{ env.tag }}",
            "developer":       "${{ matrix.developer }}",
            "repoName":        "${{ matrix.repoName }}",
            "branchName":      "${{ matrix.branchName }}",
            "userName":        "${{ matrix.userName }}",
            "origVersionName": "${{ env.origVersionName }}"
          }
          EOF

      - name: Upload Job Metadata
        if: ${{ env.commit }}
        uses: actions/upload-artifact@v4
        with:
          name: meta-${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }}
          path: /tmp/job-meta.json
          retention-days: 1

      - name: Upload APK Artifacts
        if: ${{ env.commit }}
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }}
          path: TVBoxOSC/apk/*
          retention-days: 1

      - name: Upload APK Dir
        if: ${{ env.commit && (matrix.developer == 'FongMI' || matrix.developer == 'fish2018') }}
        uses: actions/upload-artifact@v4
        with:
          name: apkdir-${{ matrix.branchName }}
          path: apk/${{ matrix.branchName }}/*.json
          retention-days: 1

      - name: Upload Version History
        if: ${{ env.commit && (matrix.developer == 'FongMI' || matrix.developer == 'fish2018') }}
        uses: actions/upload-artifact@v4
        with:
          name: history-${{ matrix.developer }}-${{ matrix.branchName }}
          path: |
            version_history.md
            version_history_webhtv.md
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Download All Metadata
        uses: actions/download-artifact@v4
        with:
          pattern: meta-*
          path: metas/
          merge-multiple: false

      - name: Download All APK Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: all-apks/
          merge-multiple: false

      - name: Download APK Dirs
        uses: actions/download-artifact@v4
        with:
          pattern: apkdir-*
          path: apk-dirs/
          merge-multiple: false

      - name: Download Version Histories
        uses: actions/download-artifact@v4
        with:
          pattern: history-*
          path: histories/
          merge-multiple: false

      - name: Process Each Build
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for meta_file in metas/*/job-meta.json; do
            [ -f "$meta_file" ] || continue

            commit=$(jq -r .commit "$meta_file")
            commitS=$(jq -r .commitS "$meta_file")
            tag=$(jq -r .tag "$meta_file")
            developer=$(jq -r .developer "$meta_file")
            repoName=$(jq -r .repoName "$meta_file")
            branchName=$(jq -r .branchName "$meta_file")
            userName=$(jq -r .userName "$meta_file")
            origVersionName=$(jq -r .origVersionName "$meta_file")

            echo "=== Processing $repoName/$branchName ($developer) ==="

            # pull 最新，避免多个 job 串行提交时冲突
            git pull --rebase --autostash origin master

            # 更新 README
            if grep -q "$repoName/$branchName" README.md; then
              sed -i "/$repoName\/$branchName/s#Updated: [a-zA-Z0-9]*#Updated: $commit#" README.md
            else
              echo "- [$repoName/$branchName](https://github.com/$userName/$repoName/tree/$branchName) (Updated: $commit)" >> README.md
            fi

            # 合并 version_history
            HIST_DIR="histories/history-${developer}-${branchName}"
            if [ -f "$HIST_DIR/version_history.md" ]; then
              cp "$HIST_DIR/version_history.md" version_history.md
            fi
            if [ -f "$HIST_DIR/version_history_webhtv.md" ]; then
              cp "$HIST_DIR/version_history_webhtv.md" version_history_webhtv.md
            fi

            # 复制 APK + JSON 到 apk 目录
            APK_SRC="apk-dirs/apkdir-${branchName}"
            if [ -d "$APK_SRC" ]; then
              mkdir -p "apk/$branchName"
              cp "$APK_SRC"/* "apk/$branchName/"
            fi

            # Release
            ARTIFACT_DIR="all-apks/apk-${userName}-${repoName}-${branchName}"
            LOG_FILE="$ARTIFACT_DIR/$userName-$branchName-Release.log"

            if [ -d "$ARTIFACT_DIR" ]; then
              # 尝试创建 release，失败则追加上传（release 已存在）
              gh release create "$tag" \
                --title "$tag" \
                --notes-file "$LOG_FILE" \
                "$ARTIFACT_DIR"/*.apk \
                "$ARTIFACT_DIR"/SourceCode-*.* \
                2>/dev/null || \
              gh release upload "$tag" \
                "$ARTIFACT_DIR"/*.apk \
                "$ARTIFACT_DIR"/SourceCode-*.* \
                --clobber
            fi

            # 提交变更
            git add README.md
            [ -f version_history.md ]       && git add version_history.md
            [ -f version_history_webhtv.md ] && git add version_history_webhtv.md
            [ -d "apk/$branchName" ]         && git add "apk/$branchName/*.json" || true
            git commit -m "Update $repoName to $origVersionName" || true
            git push origin master
          done

  clean:
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete older runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 5